version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    assignees: [umireon]
    exclude-paths:
      - ".github/workflows/*.lock.yml"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "@types/node"
        versions: ["*"]

  - package-ecosystem: npm
    directory: /@kaito-tokyo/minisign-verify
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "@types/node"
        versions: ["*"]
